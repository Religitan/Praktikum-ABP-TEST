<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ramadan Kareem</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

    <div class="container text-center mt-5">

        <h1 class="display-3 mb-3">🌙 Ramadan Kareem 🌙</h1>

        <p class="lead mb-5">Selamat Menjalankan Ibadah Puasa</p>

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card text-dark shadow">

                    <div class="card-body">

                        <h3 class="card-title">Ucapan Ramadan</h3>

                        <p class="card-text">
                            Semoga Ramadan tahun ini membawa keberkahan, kedamaian,
                            dan kebahagiaan bagi kita semua.
                        </p>

                        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#thrModal">
                            🎁 Klaim THR
                        </button>

                    </div>
                </div>

            </div>

        </div>

    </div>


    <!-- MODAL THR -->

    <div class="modal fade" id="thrModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title text-dark">🎉 Selamat!</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body text-center text-dark">

                    <h3 class="text-success">🎉 Selamat Anda Mendapatkan THR! 🎉</h3>

                    <p class="fs-5">Gunakan dengan bijak ya 😆</p>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" data-bs-dismiss="modal">
                        Alhamdulillah
                    </button>
                </div>

            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
