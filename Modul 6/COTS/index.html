<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Manajemen Produk</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container mt-5">

        <h2 class="text-center mb-4">Manajemen Data Produk</h2>

        <div class="card shadow">

            <div class="card-body">

                <form id="formProduk">

                    <div class="row g-3">

                        <div class="col-md-4">
                            <label class="form-label">Nama Produk</label>
                            <input type="text" id="nama" class="form-control" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Kategori</label>
                            <input type="text" id="kategori" class="form-control" required>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Harga</label>
                            <input type="number" id="harga" class="form-control" required>
                        </div>

                    </div>

                    <button class="btn btn-primary mt-3">
                        <i class="bi bi-plus-circle"></i> Simpan Produk
                    </button>

                </form>

            </div>
        </div>

        <div class="mt-4">

            <table id="tabelProduk" class="table table-striped">

                <thead class="table-dark">

                    <tr>
                        <th>No</th>
                        <th>Nama Produk</th>
                        <th>Kategori</th>
                        <th>Harga</th>
                        <th>Aksi</th>
                    </tr>

                </thead>

                <tbody></tbody>

            </table>

        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="js/script.js"></script>

</body>

</html>
